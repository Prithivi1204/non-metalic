<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - Secure Vault</title>
    <style>
        body { font-family: Arial; background-color: #f4f4f4; display: flex; justify-content: center; padding-top: 50px; }
        .signup-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 400px; }
        h2 { color: #333; text-align: center; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .login-link { text-align: center; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="signup-card">
        <h2>📝 Create Security Account</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Register Now</button>
        </form>
        <div class="login-link">
            Already have an account? <a href="{% url 'login' %}">Login here</a>
        </div>
    </div>
</body>
</html>
