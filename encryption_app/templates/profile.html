{% extends 'index.html' %}

{% block content %}
<div style="background: rgba(30, 41, 59, 0.8); padding: 30px; border-radius: 15px; color: white;">
    <h3>Update Profile</h3>

    <form method="POST" action="/profile/" enctype="multipart/form-data">
        {% csrf_token %}

        <div style="margin-bottom: 20px;">
            {{ form.as_p }}
        </div>

        <button type="submit" style="background: #3b82f6; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">
            UPLOAD NOW
        </button>
    </form>
</div>
{% endblock %}
